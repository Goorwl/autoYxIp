name: Auto Update txt

# 触发条件
on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动运行一次 (UTC时间)
  workflow_dispatch:       # 允许手动点击按钮运行测试

# 赋予 Actions 修改仓库代码的权限
permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 运行解析脚本
        run: python parse.py

      - name: 提交并推送修改
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add *.txt
          # 如果文件没有变化，就不会提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update us.txt" && git push)